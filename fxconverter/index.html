<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>환율 변환기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1 class="title">환율 변환기</h1>

    <div class="form">
      <!-- 금액 입력 -->
      <div class="field">
        <label for="amount">금액</label>
        <input type="number" id="amount" placeholder="금액을 입력하세요" min="0">
      </div>

      <!-- 통화 선택 -->
      <div class="currencies">
        <div class="field">
          <label for="from">변환 전</label>
          <select id="from">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="KRW" selected>KRW</option>
            <option value="JPY">JPY</option>
          </select>
        </div>

        <!-- 통화 교환 버튼 -->
        <button id="swap-btn" type="button">⇄ 통화 교환</button>

        <div class="field">
          <label for="to">변환 후</label>
          <select id="to">
            <option value="USD" selected>USD</option>
            <option value="EUR">EUR</option>
            <option value="KRW">KRW</option>
            <option value="JPY">JPY</option>
          </select>
        </div>
      </div>

      <!-- 변환 버튼 -->
      <button id="convertBtn">통화 변환</button>
    </div>

    <!-- 결과 표시 -->
    <div id="result" class="result hidden"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
