<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍길동 - 프로필</title>
  <!-- 스타일시트 연결 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 프로필 카드 컨테이너 -->
  <div class="card">
    <!-- 아바타 이모지 -->
    <div class="avatar">😉</div>
    <!-- 이름 -->
    <h1 class="name">홍길동</h1>
    <!-- 직업 -->
    <p class="job">프론트엔드 개발자</p>
    <!-- 구분선 -->
    <div class="divider"></div>
    <!-- 취미 섹션 -->
    <div class="hobbies">
      <p class="hobbies-title">취미</p>
      <!-- 취미 배지 목록 -->
      <div class="badges">
        <span class="badge">🎬 영화 감상</span>
        <span class="badge">💻 코딩</span>
        <span class="badge">✈️ 여행</span>
      </div>
    </div>
  </div>
  <!-- 앱 초기화 스크립트 -->
  <script src="main.js"></script>
</body>
</html>
